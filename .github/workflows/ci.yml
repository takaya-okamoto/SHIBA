name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # reads packageManager (pnpm@10.15.0) from package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test # includes the secret-redaction + sanitize/injection security tests (docs/98 §10)
      - run: pnpm build
      # Dependency audit (docs/98 §8). Informational — surfaces advisories without blocking the build.
      - run: pnpm audit --audit-level high
        continue-on-error: true
      # NOTE: the `reindex --all` rebuild invariant (DROP TiDB -> reindex restores) needs a live TiDB
      # and isn't run here; `reindex.test.ts` covers the pure record-builder. Run it in a DB-backed job.
