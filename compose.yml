# Telegram uses long polling => NO inbound ports are published (docs/91 §1, 98 §1.2).
# Bedrock auth = IAM user access keys in .env (keyless via an instance role is NOT possible on a plain
# Lightsail box — deploy/terraform/README.md Gotcha B). No ~/.aws mount is needed: the AWS SDK reads
# AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY straight from the environment.
services:
  app:
    build: .
    env_file: .env
    # Container base image is UTC; without this, session.ts daily-reset (04:00) fires at 13:00 JST and
    # daily-note dates skew up to 9h. digest/dream are offset-based (config tzOffsetMin) and unaffected.
    # Override via TZ in .env for non-JST deployments.
    environment:
      - TZ=${TZ:-Asia/Tokyo}
    volumes:
      - ./data:/app/data                        # source of truth (Markdown+git) + local state
    restart: unless-stopped
