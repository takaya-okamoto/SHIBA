# Telegram uses long polling => NO inbound ports are published (docs/91 §1, 98 §1.2).
services:
  app:
    build: .
    env_file: .env
    volumes:
      - ./data:/app/data                        # source of truth (Markdown+git) + local state
      - /home/ubuntu/.aws:/home/node/.aws:ro    # keyless Bedrock: instance-role config (option B; IMDS)
    restart: unless-stopped
